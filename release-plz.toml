[workspace]
# Changelog configuration
changelog_config = "cliff.toml"

# PR settings
pr_labels = ["release"]

# Git settings
# Disable GitHub release creation - cargo-dist handles this
git_release_enable = false
# Tag format: "v" prefix (matches cargo-dist trigger pattern)
git_tag_name = "v{{ version }}"

# Publish to crates.io
publish = true

[[package]]
name = "vortix"
# cargo-semver-checks only works with library crates; vortix is a binary.
# Version bumps are determined by conventional commits automatically:
#   fix: -> patch (0.1.5 -> 0.1.6)
#   feat: -> patch while pre-1.0 (0.1.6 -> 0.1.7)
#   feat!: / BREAKING CHANGE -> minor while pre-1.0 (0.1.7 -> 0.2.0)
semver_check = false
